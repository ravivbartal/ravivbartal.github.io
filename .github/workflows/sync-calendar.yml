name: Sync Family Calendar

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install googleapis
        run: npm install googleapis@118

      - name: Fetch calendar events
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          DAYS_AHEAD: '7'
          TIMEZONE: 'Asia/Jerusalem'
          OUTPUT_PATH: ./family-calendar/events.json
        run: node scripts/sync-events.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add family-calendar/events.json
          if git diff --cached --quiet; then
            echo "No changes to events.json"
          else
            git commit -m "Update family calendar events [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git pull --rebase origin main
            git push
          fi
